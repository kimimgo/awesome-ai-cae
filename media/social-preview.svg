<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/>

  <!-- Awesome badge -->
  <rect x="540" y="90" width="200" height="40" rx="20" fill="#fc60a8" opacity="0.9"/>
  <text x="640" y="117" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">AWESOME</text>

  <!-- Title -->
  <text x="640" y="215" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="bold" fill="#f0f6fc" text-anchor="middle">AI-CAE</text>

  <!-- Subtitle -->
  <text x="640" y="270" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#8b949e" text-anchor="middle">AI-Powered Tools for Computer-Aided Engineering</text>

  <!-- Divider -->
  <rect x="540" y="300" width="200" height="2" fill="url(#accent)" opacity="0.4"/>

  <!-- Category tags row 1 -->
  <rect x="195" y="335" width="70" height="30" rx="15" fill="#1f6feb" fill-opacity="0.3"/>
  <text x="230" y="355" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#58a6ff" text-anchor="middle">CFD</text>

  <rect x="285" y="335" width="70" height="30" rx="15" fill="#1f6feb" fill-opacity="0.3"/>
  <text x="320" y="355" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#58a6ff" text-anchor="middle">FEA</text>

  <rect x="375" y="335" width="70" height="30" rx="15" fill="#1f6feb" fill-opacity="0.3"/>
  <text x="410" y="355" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#58a6ff" text-anchor="middle">SPH</text>

  <rect x="465" y="335" width="80" height="30" rx="15" fill="#8b5cf6" fill-opacity="0.3"/>
  <text x="505" y="355" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#bc8cff" text-anchor="middle">MCP</text>

  <rect x="565" y="335" width="90" height="30" rx="15" fill="#1f6feb" fill-opacity="0.3"/>
  <text x="610" y="355" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#58a6ff" text-anchor="middle">PINNs</text>

  <rect x="675" y="335" width="80" height="30" rx="15" fill="#1f6feb" fill-opacity="0.3"/>
  <text x="715" y="355" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#58a6ff" text-anchor="middle">Mesh</text>

  <rect x="775" y="335" width="70" height="30" rx="15" fill="#1f6feb" fill-opacity="0.3"/>
  <text x="810" y="355" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#58a6ff" text-anchor="middle">CAD</text>

  <rect x="865" y="335" width="130" height="30" rx="15" fill="#1f6feb" fill-opacity="0.3"/>
  <text x="930" y="355" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#58a6ff" text-anchor="middle">Optimization</text>

  <!-- Stats -->
  <text x="440" y="440" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="#f0f6fc" text-anchor="middle">87+</text>
  <text x="440" y="470" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">Tools</text>

  <text x="640" y="440" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="#f0f6fc" text-anchor="middle">15</text>
  <text x="640" y="470" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">Categories</text>

  <text x="840" y="440" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="#f0f6fc" text-anchor="middle">7</text>
  <text x="840" y="470" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">Languages</text>

  <!-- Footer -->
  <text x="640" y="545" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#484f58" text-anchor="middle">Simulation  ·  Visualization  ·  Design  ·  Manufacturing</text>
  <text x="640" y="590" font-family="Courier New, monospace" font-size="15" fill="#484f58" text-anchor="middle">github.com/kimimgo/awesome-ai-cae</text>
